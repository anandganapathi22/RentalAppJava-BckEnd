services:
  kafka:
    image: apache/kafka:3.8.1
    container_name: rental-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:29093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 12

  kafka-topics:
    image: apache/kafka:3.8.1
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic rental-events-us --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic rental-events-eu --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic adhoc-goldboard-events --partitions 1 --replication-factor 1

  rental-applications:
    build: .
    image: rental-applications:local
    container_name: rental-applications
    depends_on:
      kafka:
        condition: service_healthy
      kafka-topics:
        condition: service_completed_successfully
      ollama-init:
        condition: service_completed_successfully
      chromadb:
        condition: service_started
    ports:
      - "8081:8080"
    environment:
      GOLDSIGN_MQ_ENABLED: "false"
      SPRING_JMS_LISTENER_AUTO_STARTUP: "false"
      SPRING_AI_MODEL_CHAT: "ollama"
      SPRING_AI_OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_CHAT_MODEL: "llama3"
      CHROMA_URL: "http://chromadb:8000"
      RENTAL_KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      KAFKA_GROUP_ID: "rental-applications"
      KAFKA_TOPIC_RENTAL_US: "rental-events-us"
      KAFKA_TOPIC_RENTAL_EU: "rental-events-eu"
      KAFKA_TOPIC_ADHOC: "adhoc-goldboard-events"
      SPRING_DATASOURCE_URL: "jdbc:h2:file:/app/data/rentalapps-db;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"
      SPRING_DATASOURCE_USERNAME: "sa"
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_H2_CONSOLE_SETTINGS_WEB_ALLOW_OTHERS: "true"
    volumes:
      - ./data:/app/data

  rental-kafka-producer:
    build: ./rental-kafka-producer
    image: rental-kafka-producer:local
    container_name: rental-kafka-producer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-topics:
        condition: service_completed_successfully
    ports:
      - "${PRODUCER_APP_PORT:-8090}:8090"
    environment:
      SERVER_PORT: 8090
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: rental-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "${KAFKA_UI_PORT:-8082}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "rental-local"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:29092"

  ollama:
    image: ollama/ollama:latest
    container_name: rental-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: [ "CMD-SHELL", "ollama list >/dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 12

  ollama-init:
    image: ollama/ollama:latest
    container_name: rental-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    entrypoint: [ "/bin/sh", "-c", "ollama pull llama3" ]

  chromadb:
    image: chromadb/chroma:latest
    container_name: rental-chromadb
    ports:
      - "${CHROMA_PORT:-8000}:8000"
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: "/chroma/chroma"
      ANONYMIZED_TELEMETRY: "FALSE"
    volumes:
      - chroma-data:/chroma/chroma

volumes:
  ollama-data:
  chroma-data:
