services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rental-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 12

  rental-applications:
    build: .
    image: rental-applications:local
    container_name: rental-applications
    ports:
      - "8081:8080"
    environment:
      GOLDSIGN_MQ_ENABLED: "false"
      SPRING_JMS_LISTENER_AUTO_STARTUP: "false"
      SPRING_AI_MODEL_CHAT: "${SPRING_AI_MODEL_CHAT:-ollama}"
      OLLAMA_BASE_URL: "${OLLAMA_BASE_URL:-http://host.docker.internal:11434}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.1}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-4o-mini}"
      LOGGING_FILE_NAME: "/app/logs/backend.log"
      RENTAL_ANALYTICS_LOG_PATHS: "${RENTAL_ANALYTICS_LOG_PATHS:-/app/logs/backend.log}"
      SPRING_DATASOURCE_URL: "jdbc:h2:file:/app/data/rentalapps-db;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"
      SPRING_DATASOURCE_USERNAME: "sa"
      SPRING_DATASOURCE_PASSWORD: ""
      SPRING_H2_CONSOLE_SETTINGS_WEB_ALLOW_OTHERS: "true"
      RENTAL_RABBITMQ_ENABLED: "true"
      SPRING_RABBITMQ_HOST: "rabbitmq"
      SPRING_RABBITMQ_PORT: "5672"
      SPRING_RABBITMQ_USERNAME: "guest"
      SPRING_RABBITMQ_PASSWORD: "guest"
      RENTAL_AUTH_USERNAME: "admin"
      RENTAL_AUTH_PASSWORD: "admin"
      RENTAL_AUTH_ROLE: "ADMIN"
      RENTAL_AUTH_JWT_SECRET: "replace-this-local-docker-jwt-secret-with-a-long-random-value"
      RENTAL_AUTH_TOKEN_EXPIRATION_SECONDS: "3600"
    volumes:
      - ./data:/app/data
      - ./data/logs:/app/logs
    depends_on:
      rabbitmq:
        condition: service_healthy

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: rental-open-webui
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WEBUI_AUTH=false
    volumes:
      - open-webui-data:/app/backend/data

volumes:
  rabbitmq-data:
  open-webui-data:
