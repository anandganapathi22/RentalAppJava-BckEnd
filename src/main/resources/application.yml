logging:
  level:
    root: INFO
    org.apache: INFO
spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  ai:
    model:
      chat: ${SPRING_AI_MODEL_CHAT:none}
      embedding: none
      image: none
      moderation: none
      audio:
        speech: none
        transcription: none
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o-mini}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:llama3.1}
  datasource:
    url: jdbc:h2:file:G:/rental-applications/data/rentalapps-db;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
rental:
  auth:
    username: ${RENTAL_AUTH_USERNAME:admin}
    password: ${RENTAL_AUTH_PASSWORD:admin}
    role: ${RENTAL_AUTH_ROLE:ADMIN}
    jwt-secret: ${RENTAL_AUTH_JWT_SECRET:local-development-jwt-secret-change-me}
    token-expiration-seconds: ${RENTAL_AUTH_TOKEN_EXPIRATION_SECONDS:3600}
  ui:
    allowed-origins: ${RENTAL_UI_ALLOWED_ORIGINS:http://localhost:5173}
  kafka:
    enabled: ${RENTAL_KAFKA_ENABLED:false}
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    group-id: ${KAFKA_GROUP_ID:rental-applications}
    topics:
      rental-us: ${KAFKA_TOPIC_RENTAL_US:rental-events-us}
      rental-eu: ${KAFKA_TOPIC_RENTAL_EU:rental-events-eu}
      adhoc: ${KAFKA_TOPIC_ADHOC:adhoc-goldboard-events}
  rabbitmq:
    enabled: ${RENTAL_RABBITMQ_ENABLED:false}
    exchange: ${RENTAL_RABBITMQ_EXCHANGE:rental.events}
    queue: ${RENTAL_RABBITMQ_QUEUE:rental.events.local}
    routing-key: ${RENTAL_RABBITMQ_ROUTING_KEY:rental.events}
server:
  error:
    include-exception: true
    include-stacktrace: never
    include-message: always
    include-binding-errors: always
  servlet:
    context-path:
management:
  info:
    git:
      mode: full
  endpoints:
    web:
      exposure:
        include: health, info, env, mappings
  endpoint:
    health:
      show-details: when-authorized
    env:
      show-values: always
com.hertz.digital.msf:
  security:
    jwt:
      enabled: false
      permit:
        - /gb/*
        - /actuator/health
        - /actuator/env
        - /actuator/info
        - /v3/api-docs*

events:
  publish:
    enabled: false
db:
  tables:
    customer: rentalapps-customer-data
    audit: rentalapps-audit-data
    location: rentalapps-locations-data
    shedlock: rentalapps-shedlock-data
    users: rentalapps-users-data

goldSign:
  MQ:
    enabled: ${GOLDSIGN_MQ_ENABLED:false}
    host:
      primary: primary.hertz.net
      secondary: secondary.hertz.net
    port:
      primary: 2022
      secondary: 2023
    queue:
      manager:
        primary: primaryhost
        secondary: secondaryhost
